name: Auto-merge ready PRs

on:
  pull_request:
    types: [labeled]

jobs:
  enable-auto-merge:
    if: github.event.label.name == 'ready-to-merge'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable native auto-merge (rebase, delete branch)
        run: gh pr merge "$PR" --auto --rebase --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
