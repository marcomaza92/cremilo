name: Auto-merge ready PRs

on:
  pull_request:
    types: [labeled]

jobs:
  enable-auto-merge:
    if: github.event.label.name == 'ready-to-merge'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      # gh CLI needs an explicit repo target when there's no git checkout in the runner.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Enable native auto-merge (rebase, delete branch)
        env:
          PR: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR" --auto --rebase --delete-branch
